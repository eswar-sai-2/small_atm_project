<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(to right,#eef3f9,#d9e7ff);
}

.signup-card{
max-width:400px;
margin:auto;
margin-top:80px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
background:white;
}

.btn{
border-radius:8px;
}
</style>

</head>

<body>

<div class="signup-card">

<h3 class="text-center mb-3">Create Account</h3>

<!-- ✅ ONLY ONE FORM -->
<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Enter Name" required>

<input type="password" name="pin" class="form-control mb-3" placeholder="Enter 4-digit PIN" required>

<input type="number" name="balance" class="form-control mb-3" placeholder="Initial Balance" required>

<button class="btn btn-success w-100">Create Account</button>

</form>

<p class="text-center mt-3">
Already have account? <a href="/">Login</a>
</p>

</div>

</body>
</html>
