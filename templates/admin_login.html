<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">


<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);
background-size:400% 400%;
animation: gradientBG 10s ease infinite;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-box{
width:350px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
transition:0.3s;
border-radius:8px;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center mb-3">👨‍💼 Admin Login</h3>

<!-- ✅ ERROR MESSAGE -->
{% if message %}
<div class="alert alert-danger text-center">
{{ message }}
</div>
{% endif %}

<form method="POST">

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter username" required>
</div>

<div class="mb-3">
<label>Password</label>

<div class="input-group">
    <input type="password" id="adminPassword" name="password" class="form-control" placeholder="Enter password" required>

    <button type="button" class="btn btn-outline-secondary" onclick="toggleAdminPassword()">
        <i class="fa-solid fa-eye"></i>
    </button>
</div>

</div>

<button class="btn btn-dark w-100">Login</button>

</form>

<div class="text-center mt-3">
<a href="/" class="btn btn-outline-primary w-100">Back to User Login</a>
</div>

</div>
<script>
function toggleAdminPassword(){
    var input = document.getElementById("adminPassword");

    if(input.type === "password"){
        input.type = "text";
    } else {
        input.type = "password";
    }
}
</script>

</body>

</html>
