<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bank Login</title>

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(-45deg,#6a11cb,#2575fc,#4facfe,#00f2fe);
background-size:400% 400%;
animation: gradientBG 10s ease infinite;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.main-box{
width:950px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
display:flex;
}

.left-box{
width:45%;
padding:40px;
}

.right-box{
width:55%;
background:#f4f8ff;
display:flex;
align-items:center;
justify-content:center;
}

.right-box img{
max-width:300px;
width:80%;
animation: float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

.bank-title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

button{
transition:0.3s;
border-radius:8px;
font-weight:600;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 12px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="main-box">

<!-- LEFT -->
<div class="left-box">

<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" width="60" class="mb-3">

<div class="bank-title">🏦 Welcome to the Bank</div>
<p class="text-muted mb-4">Secure ATM Banking System</p>

<form method="POST">

<div class="mb-3">
<label>Account Number</label>
<input type="number" name="account" class="form-control" placeholder="Enter account number" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="pin" class="form-control" placeholder="Enter password" required>
</div>

<button class="btn btn-primary w-100">Login</button>

</form>

<!-- 🔥 SIGNUP LINK ADDED -->
<p class="text-center mt-3">
Don't have an account? 
<a href="/signup">Create Account</a>
</p>

</div>

<!-- RIGHT -->
<div class="right-box">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
</div>

</div>

</body>

</html>
