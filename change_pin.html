<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Change PIN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Change PIN</h2>

<form method="POST">

<div class="mb-3">
<label>Old PIN</label>
<input type="password" name="old_pin" class="form-control" required>
</div>

<div class="mb-3">
<label>New PIN</label>
<input type="password" name="new_pin" class="form-control" required>
</div>

<div class="mb-3">
<label>Confirm PIN</label>
<input type="password" name="confirm_pin" class="form-control" required>
</div>

<button class="btn btn-success w-100">Update PIN</button>

</form>

<br>

<p class="text-danger">{{ message }}</p>

<a href="/dashboard" class="btn btn-primary">Back</a>

</div>

</body>
</html>
